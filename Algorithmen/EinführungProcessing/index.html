<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einführung Processing</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Algorithmen</p>
        <h1>Einführung Processing</h1>
        <p class="intro">setup() läuft einmal. draw() läuft danach immer wieder.</p>
      </div>
      <p id="runStatus" class="status-pill" aria-live="polite">Bereit</p>
    </header>

    <section class="workspace" aria-label="Interaktive Processing-Simulation">
      <section class="panel code-panel" aria-labelledby="codeTitle">
        <div class="panel-heading">
          <h2 id="codeTitle">Code</h2>
        </div>

        <pre class="code-block" aria-label="Processing-Code"><code><span class="code-line" id="lineSetup">void <span class="keyword">setup</span>(){</span><span class="code-line code-indent" id="lineSize"><span class="fn">size</span>(<input id="sizeWidth" class="code-input" type="text" inputmode="numeric" value="400" data-min="50" data-max="400" data-fallback="400" aria-label="Breite der Zeichenfläche">,<input id="sizeHeight" class="code-input" type="text" inputmode="numeric" value="400" data-min="50" data-max="400" data-fallback="400" aria-label="Höhe der Zeichenfläche">);</span><span class="code-line code-indent" id="lineBackground"><span class="fn">background</span>(<input id="backgroundR" class="code-input" type="text" inputmode="numeric" value="255" data-min="0" data-max="255" data-fallback="255" aria-label="Rotwert der Hintergrundfarbe">,<input id="backgroundG" class="code-input" type="text" inputmode="numeric" value="255" data-min="0" data-max="255" data-fallback="255" aria-label="Grünwert der Hintergrundfarbe">,<input id="backgroundB" class="code-input" type="text" inputmode="numeric" value="255" data-min="0" data-max="255" data-fallback="255" aria-label="Blauwert der Hintergrundfarbe">);</span><span class="code-line code-indent" id="lineStroke"><span class="fn">strokeWeight</span>(<input id="strokeWeight" class="code-input" type="text" inputmode="numeric" value="10" data-min="1" data-max="50" data-fallback="10" aria-label="Punktgröße">);</span><span class="code-line">}</span><span class="code-group" id="drawBlock"><span class="code-line" id="lineDraw">void <span class="keyword">draw</span>(){</span><span class="code-line code-indent" id="lineIf">if(<span id="mousePressedToken" class="mouse-token is-inactive">mousePressed</span>){</span><span class="code-line code-double-indent" id="linePoint"><span class="fn">point</span>(<span id="pointArguments" class="point-values">mouseX,mouseY</span>);</span><span class="code-line code-indent">}</span><span class="code-line">}</span></span></code></pre>
      </section>

      <section class="panel experiment-panel" aria-labelledby="canvasTitle">
        <div class="panel-heading">
          <h2 id="canvasTitle">Zeichenfeld</h2>
          <p class="counter" aria-live="polite">draw()-Durchläufe: <span id="drawCounter">0</span></p>
        </div>

        <div class="canvas-board">
          <div class="canvas-viewport" aria-label="Maximale Zeichenfläche 400 mal 400 Pixel">
            <div id="canvasStack" class="canvas-stack">
              <canvas id="drawingCanvas" class="drawing-layer" width="400" height="400" aria-label="Zeichenfläche"></canvas>
              <canvas id="gridCanvas" class="grid-layer" width="400" height="400" aria-hidden="true"></canvas>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="Steuerung">
          <button id="startButton" class="button button-primary" type="button">Start</button>
          <button id="resetButton" class="button button-secondary" type="button">Zurücksetzen</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
