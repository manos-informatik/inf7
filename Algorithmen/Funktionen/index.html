<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muster mit Funktionen zeichnen</title>
  <style>
    :root {
      --bg-top: #f5f8fc;
      --bg-bottom: #e8f0f8;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-strong: rgba(255, 255, 255, 1);
      --ink: #17313e;
      --muted: #55707f;
      --accent: #ea8f3d;
      --accent-strong: #d46f15;
      --target: #2d73b9;
      --student: #2d9b63;
      --grid: #bfd4db;
      --grid-strong: #7c9aa5;
      --card-border: rgba(23, 49, 62, 0.08);
      --shadow: 0 12px 28px rgba(31, 53, 68, 0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --board-size: 270px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before,
    body::after {
      display: none;
    }

    body::before {
      top: 32px;
      right: 4%;
      width: 220px;
      height: 220px;
      background: rgba(255, 186, 94, 0.18);
    }

    body::after {
      bottom: 48px;
      left: 4%;
      width: 180px;
      height: 180px;
      background: rgba(36, 143, 165, 0.16);
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 20px));
      margin: 0 auto;
      padding: 14px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: none;
      box-shadow: var(--shadow);
      border: 1px solid rgba(23, 49, 62, 0.08);
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .board-card,
    .control-card {
      border-radius: var(--radius-lg);
      background: var(--panel);
      border: 1px solid var(--card-border);
      box-shadow: 0 12px 28px rgba(23, 49, 62, 0.05);
    }

    .board-card h3,
    .control-card h2 {
      margin: 0 0 10px;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .level-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .level-button,
    .action-button {
      border: 0;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .level-button {
      padding: 12px 18px;
      font-weight: 700;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: inset 0 0 0 1px rgba(23, 49, 62, 0.08);
    }

    .level-button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 8px 16px rgba(212, 111, 21, 0.18);
    }

    .level-button:hover,
    .action-button:hover {
      transform: translateY(-1px);
    }

    .workspace {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .board-card {
      padding: 14px;
      animation: rise 340ms ease;
    }

    .canvas-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px;
      border-radius: 18px;
      background: #f7fbff;
      box-shadow: inset 0 0 0 1px rgba(23, 49, 62, 0.06);
      overflow: auto;
    }

    canvas {
      display: block;
      width: min(100%, var(--board-size));
      height: auto;
      border-radius: 18px;
      background: #fffdf9;
      box-shadow: inset 0 0 0 1px rgba(23, 49, 62, 0.06);
    }

    .control-card {
      padding: 16px;
      background: #ffffff;
    }

    .control-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .input-label,
    .example-title,
    .feedback-title {
      display: block;
      margin: 10px 0 8px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .template-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 14px;
    }

    .template-button {
      border: 1px solid rgba(23, 49, 62, 0.1);
      border-radius: 14px;
      background: #f8fbff;
      color: var(--ink);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, transform 140ms ease;
    }

    .template-button:hover {
      background: #eef6ff;
      transform: translateY(-1px);
    }

    .command-list {
      display: grid;
      gap: 6px;
    }

    .command-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 16px;
      border: 1px solid rgba(45, 115, 185, 0.2);
      background: rgba(45, 115, 185, 0.06);
      box-shadow: 0 4px 12px rgba(45, 115, 185, 0.08);
    }

    .row-index {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(45, 115, 185, 0.18);
      background: #ffffff;
      color: #235c96;
      font-size: 0.88rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .row-remove {
      border: 1px solid rgba(23, 49, 62, 0.1);
      border-radius: 999px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.92rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .command-template {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(45, 115, 185, 0.16);
      background: #ffffff;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.9rem;
      overflow: hidden;
    }

    .template-name {
      font-weight: 700;
      color: #235c96;
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .template-field {
      width: 74px;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(23, 49, 62, 0.12);
      background: #ffffff;
      text-align: center;
      color: var(--ink);
      font: inherit;
      min-width: 0;
    }

    .template-field:focus {
      outline: 3px solid rgba(45, 115, 185, 0.16);
      border-color: rgba(45, 115, 185, 0.34);
    }

    .template-field::-webkit-outer-spin-button,
    .template-field::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 2px dashed rgba(23, 49, 62, 0.14);
      background: #f8fbff;
      color: var(--muted);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .action-button {
      padding: 13px 18px;
      font-weight: 800;
      color: #fff;
      background: #2d73b9;
      box-shadow: 0 6px 14px rgba(45, 115, 185, 0.18);
    }

    .action-button.secondary {
      color: var(--ink);
      background: rgba(23, 49, 62, 0.09);
      box-shadow: none;
    }

    .action-button.success {
      background: #2d9b63;
      box-shadow: 0 6px 14px rgba(45, 155, 99, 0.18);
    }

    .feedback {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(23, 49, 62, 0.08);
      background: rgba(23, 49, 62, 0.05);
      min-height: 56px;
    }

    .feedback.success {
      background: rgba(45, 155, 99, 0.12);
      border-color: rgba(45, 155, 99, 0.24);
    }

    .feedback.error {
      background: rgba(194, 74, 74, 0.12);
      border-color: rgba(194, 74, 74, 0.22);
    }

    .feedback.info {
      background: rgba(45, 115, 185, 0.1);
      border-color: rgba(45, 115, 185, 0.2);
    }

    .feedback p,
    .feedback ul {
      margin: 0;
      line-height: 1.5;
    }

    .feedback ul {
      padding-left: 18px;
    }

    .mini-note {
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      main {
        width: min(100%, calc(100% - 16px));
        margin: 8px auto 12px;
        padding: 14px;
        border-radius: 22px;
      }

      .board-grid {
        grid-template-columns: 1fr;
      }

      .command-row {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .row-index {
        justify-self: start;
      }

      .row-remove {
        justify-self: end;
      }

      .command-template {
        gap: 6px;
      }

      .template-field {
        width: 84px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>Muster mit Funktionen zeichnen</h1>
      <div class="level-buttons" id="levelButtons">
        <button class="level-button active" type="button" data-level="easy">Einfach</button>
        <button class="level-button" type="button" data-level="medium">Mittel</button>
        <button class="level-button" type="button" data-level="hard">Schwer</button>
      </div>
    </header>

    <section class="workspace">
      <div class="board-grid">
        <article class="board-card">
          <h3>Zielmuster</h3>
          <div class="canvas-frame">
            <canvas id="targetCanvas" aria-label="Zielmuster im Koordinatensystem">Dein Browser unterstützt kein Canvas.</canvas>
          </div>
        </article>

        <article class="board-card">
          <h3>Dein Koordinatensystem</h3>
          <div class="canvas-frame">
            <canvas id="studentCanvas" aria-label="Eigenes Koordinatensystem">Dein Browser unterstützt kein Canvas.</canvas>
          </div>
        </article>
      </div>

      <aside class="control-card">
        <h2>Fülle die Schablonen aus</h2>
        <p>Wähle eine Schablone und trage nur Zahlen ein.</p>

        <div class="template-buttons" id="templateButtons">
          <button class="template-button" type="button" data-template="point">+ Punkt</button>
          <button class="template-button" type="button" data-template="horizontal">+ Waagerechte Strecke</button>
          <button class="template-button" type="button" data-template="vertical">+ Senkrechte Strecke</button>
          <button class="template-button" type="button" data-template="rectangle">+ Rechteck</button>
        </div>

        <div class="command-list" id="commandRows" aria-live="polite"></div>

        <div class="action-row">
          <button class="action-button" id="runButton" type="button">Ausführen</button>
          <button class="action-button secondary" id="resetButton" type="button">Zurücksetzen</button>
          <button class="action-button success" id="checkButton" type="button">Lösung prüfen</button>
        </div>

        <div class="feedback info" id="feedback" aria-live="polite">
          <p>Wähle ein Level aus und beginne mit deinen ersten Befehlen.</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const LEVELS = {
      easy: {
        label: "Einfach",
        size: 5,
        canvasSize: 270,
        commands: [
          "punkt_zeichnen(1,3)",
          "punkt_zeichnen(3,3)",
          "waagerechte_strecke_zeichnen(0,4,1)"
        ]
      },
      medium: {
        label: "Mittel",
        size: 5,
        canvasSize: 270,
        commands: [
          "rechteck_zeichnen(0,0,4,4)",
          "punkt_zeichnen(1,3)",
          "punkt_zeichnen(3,3)",
          "senkrechte_strecke_zeichnen(1,1,2)",
          "senkrechte_strecke_zeichnen(3,1,2)",
          "waagerechte_strecke_zeichnen(1,3,1)"
        ]
      },
      hard: {
        label: "Schwer",
        size: 11,
        canvasSize: 270,
        commands: [
          "rechteck_zeichnen(0,0,10,10)",
          "waagerechte_strecke_zeichnen(1,3,8)",
          "waagerechte_strecke_zeichnen(7,9,8)",
          "rechteck_zeichnen(2,6,1,1)",
          "rechteck_zeichnen(7,6,1,1)",
          "senkrechte_strecke_zeichnen(5,4,6)",
          "waagerechte_strecke_zeichnen(4,6,4)",
          "punkt_zeichnen(2,3)",
          "punkt_zeichnen(8,3)",
          "punkt_zeichnen(3,2)",
          "punkt_zeichnen(7,2)",
          "waagerechte_strecke_zeichnen(4,6,1)"
        ]
      }
    };

    const FUNCTION_TEMPLATES = {
      point: {
        label: "Punkt",
        name: "punkt_zeichnen",
        help: "Trage die Position des Punktes ein.",
        args: [
          { key: "x", label: "x" },
          { key: "y", label: "y" }
        ]
      },
      horizontal: {
        label: "Waagerechte Strecke",
        name: "waagerechte_strecke_zeichnen",
        help: "Von x1 bis x2 auf der Höhe y.",
        args: [
          { key: "x_start", label: "x_Start" },
          { key: "x_ende", label: "x_Ziel" },
          { key: "y", label: "y" }
        ]
      },
      vertical: {
        label: "Senkrechte Strecke",
        name: "senkrechte_strecke_zeichnen",
        help: "Bei x von y1 bis y2.",
        args: [
          { key: "x", label: "x" },
          { key: "y_start", label: "y_Start" },
          { key: "y_ende", label: "y_Ziel" }
        ]
      },
      rectangle: {
        label: "Rechteck",
        name: "rechteck_zeichnen",
        help: "Erst Ecke, dann Höhe und Breite.",
        args: [
          { key: "x", label: "x" },
          { key: "y", label: "y" },
          { key: "höhe", label: "höhe" },
          { key: "breite", label: "breite" }
        ]
      }
    };

    const targetCanvas = document.getElementById("targetCanvas");
    const studentCanvas = document.getElementById("studentCanvas");
    const commandRows = document.getElementById("commandRows");
    const feedback = document.getElementById("feedback");
    const templateButtons = Array.from(document.querySelectorAll(".template-button"));
    const levelButtons = Array.from(document.querySelectorAll(".level-button"));

    const drafts = {
      easy: [],
      medium: [],
      hard: []
    };

    let currentLevelKey = "easy";
    let currentTarget = null;
    let currentStudent = null;
    let nextRowId = 1;

    function createRowState(templateKey, values = {}) {
      const template = FUNCTION_TEMPLATES[templateKey];

      return {
        id: `row-${nextRowId++}`,
        templateKey,
        values: template.args.reduce((result, arg) => {
          result[arg.key] = values[arg.key] ?? "";
          return result;
        }, {})
      };
    }

    function renderCommandRows(focusRowId = null) {
      commandRows.innerHTML = "";
      const rows = drafts[currentLevelKey];

      if (rows.length === 0) {
        const emptyState = document.createElement("div");
        emptyState.className = "empty-state";
        emptyState.innerHTML = "<strong>Noch keine Schablone.</strong><p>Tippe oben auf eine Funktion. Dann erscheint hier eine fertige Zeile zum Ausfüllen.</p>";
        commandRows.appendChild(emptyState);
        return;
      }

      rows.forEach((row, index) => {
        const template = FUNCTION_TEMPLATES[row.templateKey];
        const rowElement = document.createElement("div");
        rowElement.className = "command-row";
        rowElement.dataset.rowId = row.id;

        const title = document.createElement("div");
        title.className = "row-index";
        title.textContent = `Zeile ${index + 1}`;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "row-remove";
        removeButton.textContent = "Entfernen";
        removeButton.addEventListener("click", () => {
          drafts[currentLevelKey] = drafts[currentLevelKey].filter((entry) => entry.id !== row.id);
          renderCommandRows();
        });

        const templateLine = document.createElement("div");
        templateLine.className = "command-template";

        const templateName = document.createElement("span");
        templateName.className = "template-name";
        templateName.textContent = template.name;
        templateLine.append(templateName, document.createTextNode("("));

        template.args.forEach((arg, argIndex) => {
          const input = document.createElement("input");
          input.className = "template-field";
          input.type = "number";
          input.inputMode = "numeric";
          input.min = "0";
          input.step = "1";
          input.placeholder = arg.label;
          input.value = row.values[arg.key];
          input.setAttribute("aria-label", `${template.label} ${arg.label}`);
          input.addEventListener("input", (event) => {
            row.values[arg.key] = event.target.value.trim();
          });
          templateLine.appendChild(input);

          if (argIndex < template.args.length - 1) {
            templateLine.appendChild(document.createTextNode(", "));
          }
        });

        templateLine.appendChild(document.createTextNode(")"));

        rowElement.append(title, templateLine, removeButton);
        commandRows.appendChild(rowElement);
      });

      if (focusRowId) {
        const inputToFocus = commandRows.querySelector(`[data-row-id="${focusRowId}"] .template-field`);
        inputToFocus?.focus();
      }
    }

    function addTemplateRow(templateKey) {
      const row = createRowState(templateKey);
      drafts[currentLevelKey].push(row);
      renderCommandRows(row.id);
    }

    function buildCommandsFromRows() {
      const rows = drafts[currentLevelKey];
      const commands = [];
      const rowNumbers = [];
      const errors = [];
      let hasContent = false;

      rows.forEach((row, index) => {
        const template = FUNCTION_TEMPLATES[row.templateKey];
        const values = template.args.map((arg) => String(row.values[arg.key] ?? "").trim());
        const filledCount = values.filter((value) => value !== "").length;

        if (filledCount === 0) {
          return;
        }

        hasContent = true;

        if (filledCount < values.length) {
          errors.push(`Zeile ${index + 1}: Bitte fülle alle freien Felder aus.`);
          return;
        }

        commands.push(`${template.name}(${values.join(",")})`);
        rowNumbers.push(index + 1);
      });

      return {
        text: commands.join("\n"),
        rowNumbers,
        errors,
        hasContent
      };
    }

    function createEmptyDrawing(size) {
      return {
        size,
        points: new Set(),
        hSegments: new Set(),
        vSegments: new Set()
      };
    }

    function addPoint(drawing, x, y) {
      drawing.points.add(`${x},${y}`);
    }

    function addHorizontal(drawing, xStart, xEnd, y) {
      const start = Math.min(xStart, xEnd);
      const end = Math.max(xStart, xEnd);

      if (start === end) {
        addPoint(drawing, start, y);
        return;
      }

      for (let x = start; x < end; x += 1) {
        drawing.hSegments.add(`${x},${y}`);
      }
    }

    function addVertical(drawing, x, yStart, yEnd) {
      const start = Math.min(yStart, yEnd);
      const end = Math.max(yStart, yEnd);

      if (start === end) {
        addPoint(drawing, x, start);
        return;
      }

      for (let y = start; y < end; y += 1) {
        drawing.vSegments.add(`${x},${y}`);
      }
    }

    function addRectangle(drawing, x, y, height, width) {
      addHorizontal(drawing, x, x + width, y);
      addHorizontal(drawing, x, x + width, y + height);
      addVertical(drawing, x, y, y + height);
      addVertical(drawing, x + width, y, y + height);
    }

    function normalizeLines(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    function parseIntegerList(argumentText) {
      if (argumentText.trim() === "") {
        return [];
      }

      return argumentText.split(",").map((part) => {
        const trimmed = part.trim();

        if (!/^-?\d+$/.test(trimmed)) {
          throw new Error(`"${trimmed}" ist keine ganze Zahl.`);
        }

        return Number.parseInt(trimmed, 10);
      });
    }

    function validateRange(value, size, label) {
      const maxCoordinate = size - 1;

      if (!Number.isInteger(value) || value < 0 || value > maxCoordinate) {
        throw new Error(`${label} muss im aktuellen Raster zwischen 0 und ${maxCoordinate} liegen.`);
      }
    }

    function parseCommands(text, level) {
      const drawing = createEmptyDrawing(level.size);
      const errors = [];
      const lines = normalizeLines(text);

      lines.forEach((line, index) => {
        const openIndex = line.indexOf("(");
        const closeIndex = line.lastIndexOf(")");

        if (openIndex <= 0 || closeIndex !== line.length - 1) {
          errors.push(`Zeile ${index + 1}: Bitte schreibe den Aufruf in der Form name(parameter, parameter).`);
          return;
        }

        const name = line.slice(0, openIndex).trim();
        const argumentText = line.slice(openIndex + 1, closeIndex);
        let args;

        try {
          args = parseIntegerList(argumentText);
        } catch (error) {
          errors.push(`Zeile ${index + 1}: ${error.message}`);
          return;
        }

        try {
          switch (name) {
            case "punkt_zeichnen": {
              if (args.length !== 2) {
                throw new Error("punkt_zeichnen braucht genau 2 Parameter.");
              }
              const [x, y] = args;
              validateRange(x, level.size, "x");
              validateRange(y, level.size, "y");
              addPoint(drawing, x, y);
              break;
            }

            case "waagerechte_strecke_zeichnen": {
              if (args.length !== 3) {
                throw new Error("waagerechte_strecke_zeichnen braucht genau 3 Parameter.");
              }
              const [xStart, xEnd, y] = args;
              validateRange(xStart, level.size, "x_start");
              validateRange(xEnd, level.size, "x_ende");
              validateRange(y, level.size, "y");
              addHorizontal(drawing, xStart, xEnd, y);
              break;
            }

            case "senkrechte_strecke_zeichnen": {
              if (args.length !== 3) {
                throw new Error("senkrechte_strecke_zeichnen braucht genau 3 Parameter.");
              }
              const [x, yStart, yEnd] = args;
              validateRange(x, level.size, "x");
              validateRange(yStart, level.size, "y_start");
              validateRange(yEnd, level.size, "y_ende");
              addVertical(drawing, x, yStart, yEnd);
              break;
            }

            case "rechteck_zeichnen": {
              if (args.length !== 4) {
                throw new Error("rechteck_zeichnen braucht genau 4 Parameter.");
              }
              const [x, y, height, width] = args;
              validateRange(x, level.size, "x");
              validateRange(y, level.size, "y");

              if (height < 1 || width < 1) {
                throw new Error("Höhe und Breite müssen mindestens 1 sein.");
              }

              if (x + width > level.size - 1 || y + height > level.size - 1) {
                throw new Error(`Das Rechteck passt nicht vollständig in das ${level.size}x${level.size}-Raster.`);
              }

              addRectangle(drawing, x, y, height, width);
              break;
            }

            default:
              throw new Error(`Die Funktion "${name}" ist nicht erlaubt.`);
          }
        } catch (error) {
          errors.push(`Zeile ${index + 1}: ${error.message}`);
        }
      });

      return {
        drawing,
        errors,
        hasContent: lines.length > 0
      };
    }

    function resizeCanvas(canvas, size) {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(size * dpr);
      canvas.height = Math.round(size * dpr);
      canvas.style.width = `${size}px`;
      canvas.style.height = `${size}px`;
      const context = canvas.getContext("2d");
      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      return context;
    }

    function getBoardGeometry(canvas, gridSize) {
      const padding = { top: 28, right: 28, bottom: 46, left: 48 };
      const width = Number.parseFloat(canvas.style.width) || canvas.clientWidth;
      const height = Number.parseFloat(canvas.style.height) || canvas.clientHeight;
      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;
      const stepX = gridSize > 1 ? plotWidth / (gridSize - 1) : plotWidth;
      const stepY = gridSize > 1 ? plotHeight / (gridSize - 1) : plotHeight;

      return {
        width,
        height,
        padding,
        plotWidth,
        plotHeight,
        stepX,
        stepY,
        pointRadius: Math.max(5, Math.min(stepX, stepY) * 0.16),
        lineWidth: Math.max(4, Math.min(stepX, stepY) * 0.12)
      };
    }

    function toCanvasPoint(geometry, x, y) {
      return {
        x: geometry.padding.left + x * geometry.stepX,
        y: geometry.height - geometry.padding.bottom - y * geometry.stepY
      };
    }

    function drawGrid(context, canvas, gridSize) {
      const geometry = getBoardGeometry(canvas, gridSize);
      context.clearRect(0, 0, geometry.width, geometry.height);

      const gridLeft = geometry.padding.left;
      const gridTop = geometry.padding.top;
      const gridRight = geometry.width - geometry.padding.right;
      const gridBottom = geometry.height - geometry.padding.bottom;

      context.fillStyle = "#fffdf9";
      context.fillRect(0, 0, geometry.width, geometry.height);

      context.fillStyle = "rgba(255, 240, 220, 0.55)";
      context.fillRect(gridLeft - 10, gridTop - 10, geometry.plotWidth + 20, geometry.plotHeight + 20);

      context.strokeStyle = "rgba(23, 49, 62, 0.08)";
      context.lineWidth = 1;
      context.strokeRect(gridLeft - 10, gridTop - 10, geometry.plotWidth + 20, geometry.plotHeight + 20);

      context.save();
      context.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim();
      context.lineWidth = 1;
      context.setLineDash([5, 6]);

      for (let index = 0; index < gridSize; index += 1) {
        const x = gridLeft + index * geometry.stepX;
        const y = gridBottom - index * geometry.stepY;

        context.beginPath();
        context.moveTo(x, gridTop);
        context.lineTo(x, gridBottom);
        context.stroke();

        context.beginPath();
        context.moveTo(gridLeft, y);
        context.lineTo(gridRight, y);
        context.stroke();
      }

      context.restore();

      context.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid-strong").trim();
      context.lineWidth = 2;

      context.beginPath();
      context.moveTo(gridLeft, gridBottom);
      context.lineTo(gridRight + 8, gridBottom);
      context.stroke();

      context.beginPath();
      context.moveTo(gridLeft, gridBottom);
      context.lineTo(gridLeft, gridTop - 8);
      context.stroke();

      context.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid-strong").trim();
      context.font = "700 14px 'Avenir Next', 'Trebuchet MS', sans-serif";
      context.textAlign = "center";
      context.textBaseline = "top";

      for (let value = 0; value < gridSize; value += 1) {
        const point = toCanvasPoint(geometry, value, 0);
        context.fillText(String(value), point.x, gridBottom + 12);
      }

      context.textAlign = "right";
      context.textBaseline = "middle";

      for (let value = 0; value < gridSize; value += 1) {
        const point = toCanvasPoint(geometry, 0, value);
        context.fillText(String(value), gridLeft - 14, point.y);
      }

      context.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--muted").trim();
      context.font = "800 14px 'Avenir Next', 'Trebuchet MS', sans-serif";
      context.textAlign = "center";
      context.textBaseline = "alphabetic";
      context.fillText("x", gridRight + 18, gridBottom + 5);
      context.textAlign = "left";
      context.fillText("y", gridLeft - 2, gridTop - 14);

      context.fillStyle = "rgba(45, 115, 185, 0.18)";

      for (let y = 0; y < gridSize; y += 1) {
        for (let x = 0; x < gridSize; x += 1) {
          const point = toCanvasPoint(geometry, x, y);
          context.beginPath();
          context.arc(point.x, point.y, 2.4, 0, Math.PI * 2);
          context.fill();
        }
      }

      return geometry;
    }

    function drawDrawing(canvas, drawing, color) {
      const context = canvas.getContext("2d");
      const geometry = drawGrid(context, canvas, drawing.size);

      context.strokeStyle = color;
      context.fillStyle = color;
      context.lineWidth = geometry.lineWidth;
      context.lineCap = "round";
      context.lineJoin = "round";

      drawing.hSegments.forEach((segment) => {
        const [x, y] = segment.split(",").map(Number);
        const start = toCanvasPoint(geometry, x, y);
        const end = toCanvasPoint(geometry, x + 1, y);
        context.beginPath();
        context.moveTo(start.x, start.y);
        context.lineTo(end.x, end.y);
        context.stroke();
      });

      drawing.vSegments.forEach((segment) => {
        const [x, y] = segment.split(",").map(Number);
        const start = toCanvasPoint(geometry, x, y);
        const end = toCanvasPoint(geometry, x, y + 1);
        context.beginPath();
        context.moveTo(start.x, start.y);
        context.lineTo(end.x, end.y);
        context.stroke();
      });

      drawing.points.forEach((pointKey) => {
        const [x, y] = pointKey.split(",").map(Number);
        const point = toCanvasPoint(geometry, x, y);
        context.beginPath();
        context.arc(point.x, point.y, geometry.pointRadius, 0, Math.PI * 2);
        context.fill();
      });
    }

    function setsEqual(first, second) {
      if (first.size !== second.size) {
        return false;
      }

      for (const entry of first) {
        if (!second.has(entry)) {
          return false;
        }
      }

      return true;
    }

    function drawingsEqual(first, second) {
      return first.size === second.size
        && setsEqual(first.points, second.points)
        && setsEqual(first.hSegments, second.hSegments)
        && setsEqual(first.vSegments, second.vSegments);
    }

    function setFeedback(type, content) {
      feedback.className = `feedback ${type}`;
      feedback.innerHTML = content;
    }

    function applyLevel(levelKey) {
      currentLevelKey = levelKey;
      const level = LEVELS[levelKey];

      document.documentElement.style.setProperty("--board-size", `${level.canvasSize}px`);

      levelButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.level === levelKey);
      });

      resizeCanvas(targetCanvas, level.canvasSize);
      resizeCanvas(studentCanvas, level.canvasSize);

      const parsedTarget = parseCommands(level.commands.join("\n"), level);
      currentTarget = parsedTarget.drawing;
      currentStudent = createEmptyDrawing(level.size);
      renderCommandRows();
      drawDrawing(targetCanvas, currentTarget, getComputedStyle(document.documentElement).getPropertyValue("--target").trim());
      drawDrawing(studentCanvas, currentStudent, getComputedStyle(document.documentElement).getPropertyValue("--student").trim());
      setFeedback("info", `<p>Level <strong>${level.label}</strong> geladen.</p>`);
    }

    function executeCommands(showMessage = true) {
      const level = LEVELS[currentLevelKey];
      const prepared = buildCommandsFromRows();

      if (prepared.errors.length > 0) {
        setFeedback(
          "error",
          `<p><strong>Bitte prüfe deine Eingabe.</strong></p><ul>${prepared.errors.map((error) => `<li>${error}</li>`).join("")}</ul>`
        );
        return { ok: false, hasContent: prepared.hasContent };
      }

      if (!prepared.hasContent) {
        currentStudent = createEmptyDrawing(level.size);
        drawDrawing(studentCanvas, currentStudent, getComputedStyle(document.documentElement).getPropertyValue("--student").trim());

        if (showMessage) {
          setFeedback("info", "<p>Füge zuerst eine Schablone hinzu und trage dann Zahlen ein.</p>");
        }

        return { ok: true, hasContent: false };
      }

      const parsed = parseCommands(prepared.text, level);

      if (parsed.errors.length > 0) {
        const adjustedErrors = parsed.errors.map((error) => error.replace(/Zeile (\d+)/, (match, lineNumber) => {
          const rowNumber = prepared.rowNumbers[Number(lineNumber) - 1];
          return rowNumber ? `Zeile ${rowNumber}` : match;
        }));

        setFeedback(
          "error",
          `<p><strong>Bitte prüfe deine Eingabe.</strong></p><ul>${adjustedErrors.map((error) => `<li>${error}</li>`).join("")}</ul>`
        );
        return { ok: false, hasContent: true };
      }

      currentStudent = parsed.drawing;
      drawDrawing(studentCanvas, currentStudent, getComputedStyle(document.documentElement).getPropertyValue("--student").trim());

      if (showMessage) {
        setFeedback("info", "<p><strong>Zeichnung aktualisiert.</strong> Deine Schablonen wurden im rechten Koordinatensystem ausgeführt.</p>");
      }

      return { ok: true, hasContent: true };
    }

    function resetStudent() {
      const level = LEVELS[currentLevelKey];
      currentStudent = createEmptyDrawing(level.size);
      drawDrawing(studentCanvas, currentStudent, getComputedStyle(document.documentElement).getPropertyValue("--student").trim());
      setFeedback("info", "<p>Die Zeichnung rechts wurde zurückgesetzt. Deine Schablonen bleiben erhalten.</p>");
    }

    function checkSolution() {
      const executed = executeCommands(false);

      if (!executed.ok) {
        return;
      }

      if (!executed.hasContent) {
        setFeedback("info", "<p>Fülle zuerst mindestens eine Schablone aus.</p>");
        return;
      }

      if (drawingsEqual(currentStudent, currentTarget)) {
        setFeedback("success", "<p><strong>Richtig gelöst!</strong> Deine Zeichnung stimmt mit dem Zielmuster überein.</p>");
      } else {
        setFeedback("error", "<p><strong>Noch nicht ganz richtig.</strong> Vergleiche die Lage der Punkte, Strecken und Rechteckkanten noch einmal mit dem Zielmuster.</p>");
      }
    }

    document.getElementById("runButton").addEventListener("click", () => {
      executeCommands(true);
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      resetStudent();
    });

    document.getElementById("checkButton").addEventListener("click", () => {
      checkSolution();
    });

    templateButtons.forEach((button) => {
      button.addEventListener("click", () => {
        addTemplateRow(button.dataset.template);
      });
    });

    levelButtons.forEach((button) => {
      button.addEventListener("click", () => {
        applyLevel(button.dataset.level);
      });
    });

    window.addEventListener("resize", () => {
      const level = LEVELS[currentLevelKey];
      resizeCanvas(targetCanvas, level.canvasSize);
      resizeCanvas(studentCanvas, level.canvasSize);
      drawDrawing(targetCanvas, currentTarget, getComputedStyle(document.documentElement).getPropertyValue("--target").trim());
      drawDrawing(studentCanvas, currentStudent, getComputedStyle(document.documentElement).getPropertyValue("--student").trim());
    });

    applyLevel(currentLevelKey);
  </script>
</body>
</html>
